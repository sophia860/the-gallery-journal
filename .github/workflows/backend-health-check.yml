name: Backend Health Check

on:
  # Every hour on the hour
  schedule:
    - cron: "0 * * * *"
  # Allow manual triggering from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  health-check:
    name: Hourly backend health check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      BACKEND_URL: ${{ secrets.BACKEND_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Perform backend health check (expects 200 under 5s)
        id: health
        continue-on-error: true
        run: |
          if [ -z "$BACKEND_URL" ]; then
            echo "::error::BACKEND_URL secret is not configured."
            echo "endpoint=BACKEND_URL not configured" >> $GITHUB_OUTPUT
            echo "status_code=0" >> $GITHUB_OUTPUT
            echo "response_time_ms=0" >> $GITHUB_OUTPUT
            echo "body_ok=false" >> $GITHUB_OUTPUT
            echo "health_state=fail" >> $GITHUB_OUTPUT
            exit 0
          fi

          ENDPOINT="${BACKEND_URL%/}/api/health"
          echo "Checking health endpoint: $ENDPOINT"

          START_TIME=$(($(date +%s)*1000))
          HTTP_CODE=$(curl -o /tmp/health-body -s -w "%{http_code}" --max-time 10 "$ENDPOINT" || echo 000)
          END_TIME=$(($(date +%s)*1000))
          BODY=$(cat /tmp/health-body 2>/dev/null || true)
          DURATION_MS=$((END_TIME-START_TIME))

          case $HTTP_CODE in
            ''|*[!0-9]*) HTTP_CODE=0 ;;
          esac

          if echo "$BODY" | grep -qi '"status"[[:space:]]*:[[:space:]]*"ok"'; then
            BODY_OK=true
          else
            BODY_OK=false
          fi

          echo "endpoint=$ENDPOINT" >> $GITHUB_OUTPUT
          echo "status_code=$HTTP_CODE" >> $GITHUB_OUTPUT
          echo "response_time_ms=$DURATION_MS" >> $GITHUB_OUTPUT
          echo "body_ok=$BODY_OK" >> $GITHUB_OUTPUT

          # Pass only when HTTP 200 and latency under 5 seconds
          if [ "$HTTP_CODE" -eq 200 ] && [ "$DURATION_MS" -lt 5000 ]; then
            echo "health_state=pass" >> $GITHUB_OUTPUT
          else
            echo "health_state=fail" >> $GITHUB_OUTPUT
          fi

      - name: Create issue on failure
        if: steps.health.outputs.health_state == 'fail'
        uses: actions/github-script@v7
        env:
          ENDPOINT: ${{ steps.health.outputs.endpoint }}
          STATUS_CODE: ${{ steps.health.outputs.status_code }}
          RESPONSE_TIME: ${{ steps.health.outputs.response_time_ms }}
          BODY_OK: ${{ steps.health.outputs.body_ok }}
        with:
          script: |
            const {context, github} = require('@actions/github');

            const labels = ['bug', 'backend'];
            for (const name of labels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name,
                });
              } catch (error) {
                if (error.status === 404) {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name,
                    color: name === 'bug' ? 'd73a4a' : '5b8def',
                    description: name === 'bug' ? 'Something is not working' : 'Backend-related issue',
                  });
                } else {
                  throw error;
                }
              }
            }

            const endpoint = process.env.ENDPOINT || 'Unknown endpoint';
            const statusCode = process.env.STATUS_CODE || 'Unknown';
            const responseTime = process.env.RESPONSE_TIME || 'Unknown';
            const bodyOk = process.env.BODY_OK || 'false';
            const timestamp = new Date().toISOString().replace('T', ' ').replace('Z', ' UTC');

            const title = `🚨 Backend Health Check Failed — ${timestamp}`;
            const body = [
              'An automated backend health check failed.',
              '',
              `- **Endpoint:** ${endpoint}`,
              `- **HTTP Status:** ${statusCode}`,
              `- **Response Time:** ${responseTime} ms`,
              `- **Body Contains "status: ok":** ${bodyOk}`,
              `- **Timestamp (UTC):** ${timestamp}`,
              '',
              `Triggered by: ${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels,
            });

      - name: Fail workflow when unhealthy
        if: steps.health.outputs.health_state == 'fail'
        run: |
          echo "::error::Backend health check failed (HTTP ${{ steps.health.outputs.status_code }}, ${{ steps.health.outputs.response_time_ms }} ms)."
          exit 1
