<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Writer's Studio</title>
  <style>
    :root {
      --bg: #f8f6f2;
      --paper: #ffffff;
      --ink: #1f1f1f;
      --muted: #6e6a63;
      --border: #e5e1da;
      --accent: #c07a5c;
      --accent-2: #a06043;
      --soft: #f1ece4;
      --mono: "IBM Plex Mono", "SFMono-Regular", Menlo, monospace;
      --serif: "IBM Plex Serif", "Georgia", serif;
      --sans: "Inter", "Helvetica Neue", Arial, sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--serif);
      background: var(--bg);
      color: var(--ink);
      line-height: 1.6;
    }
    a { color: inherit; }

    .app-shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Login */
    .login-shell {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top left, rgba(212,175,55,0.16), transparent 55%),
                  radial-gradient(circle at bottom right, rgba(193,122,92,0.18), transparent 55%),
                  #f7f4ee;
      padding: 2.5rem 1.25rem;
    }
    .login-card {
      width: 100%;
      max-width: 1100px;
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(0, 1fr);
      gap: 2rem;
      background: rgba(255,255,255,0.94);
      border-radius: 18px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.12);
      overflow: hidden;
      border: 1px solid rgba(0,0,0,0.04);
    }
    .login-left {
      padding: 3rem 3.25rem;
      border-right: 1px solid var(--border);
      background: linear-gradient(135deg, rgba(255,255,255,0.98), rgba(255,250,245,0.96));
    }
    .login-right {
      padding: 2.75rem 3rem;
      background: radial-gradient(circle at top, rgba(212,175,55,0.12), transparent 55%),
                  linear-gradient(180deg, #101010, #191919);
      color: #f5f2ea;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .logo { text-transform: uppercase; letter-spacing: 0.14em; font-size: 0.82rem; color: var(--muted); }
    .title { font-size: 2.6rem; font-weight: 300; margin: 0.5rem 0 0; color: var(--ink); }
    .tagline { color: var(--accent); font-style: italic; margin: 0.2rem 0 2rem; }
    .tabs { display: inline-flex; padding: 0.25rem; background: var(--soft); border-radius: 999px; margin-bottom: 1.5rem; }
    .tab {
      border: none; background: transparent; padding: 0.55rem 1.2rem; border-radius: 999px; cursor: pointer;
      font-family: var(--serif); color: var(--muted); letter-spacing: 0.02em;
    }
    .tab.active { background: #fff; color: var(--ink); box-shadow: 0 6px 20px rgba(0,0,0,0.08); }
    .form-group { margin-bottom: 1.2rem; }
    label { display: block; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 0.4rem; }
    input, textarea, select {
      width: 100%; border: 1px solid var(--border); border-radius: 12px; padding: 0.85rem 1rem; font-family: var(--serif);
      font-size: 1rem; background: #fff; transition: border 0.2s, box-shadow 0.2s;
    }
    input:focus, textarea:focus, select:focus {
      outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(192,122,92,0.2);
    }
    .btn {
      width: 100%; border: none; padding: 0.95rem 1rem; border-radius: 12px; background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff; font-family: var(--sans); text-transform: uppercase; letter-spacing: 0.05em; cursor: pointer; font-weight: 600;
      box-shadow: 0 14px 30px rgba(192,122,92,0.4); transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 16px 34px rgba(192,122,92,0.45); }
    .error { color: #d9534f; font-size: 0.9rem; margin-top: 0.5rem; display: none; }

    .demo-row { display: flex; gap: 0.6rem; flex-wrap: wrap; margin-top: 1rem; }
    .pill {
      flex: 1 1 180px; border-radius: 999px; padding: 0.55rem 0.8rem; background: #fff; border: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center; color: var(--ink); cursor: pointer;
    }
    .pill strong { color: var(--accent-2); font-weight: 600; }
    .pill span { color: var(--muted); font-size: 0.86rem; }
    .pill:hover { border-color: var(--accent); }

    .right-header { text-transform: uppercase; letter-spacing: 0.18em; font-size: 0.78rem; color: rgba(245,242,234,0.72); }
    .right-quote-title { font-size: 1.3rem; margin: 0.9rem 0; font-weight: 300; }
    .right-quote { color: rgba(245,242,234,0.9); line-height: 1.7; }
    .excerpt-card { margin-top: 1.6rem; padding: 1.2rem; border-radius: 14px; background: rgba(12,12,12,0.72); border: 1px solid rgba(255,255,255,0.06); }
    .badge { display: inline-flex; align-items: center; gap: 0.45rem; padding: 0.35rem 0.75rem; border-radius: 999px; border: 1px solid rgba(245,242,234,0.36); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.14em; margin-top: 1.4rem; color: rgba(245,242,234,0.85); }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #7d9b7a; box-shadow: 0 0 10px rgba(125,155,122,0.7); }

    /* App layout */
    .topbar {
      display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.5rem; background: #fff; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 10;
    }
    .nav { display: flex; gap: 0.6rem; flex-wrap: wrap; }
    .nav button {
      border: 1px solid var(--border); background: #fff; padding: 0.65rem 0.9rem; border-radius: 10px; cursor: pointer;
      font-family: var(--sans); color: var(--ink);
    }
    .nav button.active { border-color: var(--accent); color: var(--accent-2); background: #fff7f2; }
    .pill-user { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.55rem 0.9rem; border: 1px solid var(--border); border-radius: 12px; background: #fff; }
    .layout {
      display: grid; grid-template-columns: minmax(0, 2fr) minmax(280px, 1fr); gap: 1.25rem; padding: 1.25rem 1.5rem 2rem;
    }
    .card {
      background: #fff; border: 1px solid var(--border); border-radius: 14px; padding: 1.2rem 1.25rem; box-shadow: 0 10px 24px rgba(0,0,0,0.04);
    }
    h2 { margin-top: 0; font-weight: 500; letter-spacing: -0.01em; }
    .subtle { color: var(--muted); font-size: 0.95rem; }
    .list { list-style: none; padding: 0; margin: 0; display: grid; gap: 0.65rem; }
    .list li { padding: 0.65rem 0.75rem; border: 1px solid var(--border); border-radius: 10px; background: #fff; display: flex; justify-content: space-between; align-items: center; }

    .editor-shell { display: grid; grid-template-columns: minmax(0, 1.6fr) minmax(280px, 1fr); gap: 1rem; }
    .textarea {
      width: 100%; min-height: 260px; border-radius: 12px; border: 1px solid var(--border); padding: 1rem; font-family: var(--serif); font-size: 1rem; background: #fff;
    }
    .preview {
      border: 1px solid var(--border); border-radius: 12px; background: var(--paper); padding: 1.25rem; min-height: 260px; line-height: 1.8;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.6);
    }
    .lab-controls { display: grid; gap: 0.75rem; }
    .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px,1fr)); gap: 0.9rem; }
    .gallery-card { padding: 0.95rem; border: 1px solid var(--border); border-radius: 12px; background: #fff; }
    .status-tag { display: inline-flex; align-items: center; gap: 0.3rem; padding: 0.3rem 0.6rem; border-radius: 999px; border: 1px solid var(--border); font-size: 0.82rem; }

    @media (max-width: 980px) {
      .login-card { grid-template-columns: 1fr; }
      .login-left { border-right: none; border-bottom: 1px solid var(--border); }
      .layout, .editor-shell { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="app" class="app-shell"></div>

  <script>
    // Data stores
    let users = JSON.parse(localStorage.getItem('studioUsers') || '[]');
    let drafts = JSON.parse(localStorage.getItem('studioDrafts') || '[]');
    let currentUser = JSON.parse(sessionStorage.getItem('currentUser') || 'null');

    function persist() {
      localStorage.setItem('studioUsers', JSON.stringify(users));
      localStorage.setItem('studioDrafts', JSON.stringify(drafts));
      if (currentUser) sessionStorage.setItem('currentUser', JSON.stringify(currentUser));
    }

    const demoUsers = [
      { email: 'anna@example.com', password: 'writer123', name: 'Anna Reyes', role: 'writer' },
      { email: 'editor@example.com', password: 'editor123', name: 'Morgan Hill', role: 'editor' },
    ];
    demoUsers.forEach(d => { if (!users.find(u => u.email === d.email)) users.push({ id: 'demo-' + d.email, ...d }); });
    persist();

    function showLogin() {
      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="login-shell">
          <div class="login-card">
            <div class="login-left">
              <div>
                <div class="logo">The Gallery Journal</div>
                <h1 class="title">The Writer's Studio</h1>
                <div class="tagline">Step into a quiet room built for your pages.</div>
                <div class="tabs">
                  <button class="tab active" id="tab-signin">Sign in</button>
                  <button class="tab" id="tab-new">New writer</button>
                </div>
                <form id="signin-form">
                  <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="anna@example.com" required autocomplete="username">
                  </div>
                  <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                  </div>
                  <button class="btn" type="submit">Enter studio</button>
                  <div class="error" id="login-error">Invalid credentials</div>
                  <p class="subtle" style="margin-top:0.6rem;">Use the demo accounts below, or sign in with a stored account.</p>
                </form>
                <form id="new-form" style="display:none;">
                  <div class="form-group">
                    <label for="new-name">Your name</label>
                    <input type="text" id="new-name" placeholder="Type your name to begin" required>
                  </div>
                  <button class="btn" type="submit">Create my studio</button>
                  <p class="subtle" style="margin-top:0.6rem;">We'll create a local writer account in this browser so you can start drafting immediately.</p>
                </form>
                <div class="demo-row">
                  <div class="pill" onclick="fillDemo('anna@example.com','writer123')"><strong>Writer</strong><span>anna@example.com · writer123</span></div>
                  <div class="pill" onclick="fillDemo('editor@example.com','editor123')"><strong>Editor</strong><span>editor@example.com · editor123</span></div>
                </div>
              </div>
              <div class="subtle" style="margin-top:2rem;">Your work lives only in this browser. Clear storage to reset.</div>
            </div>
            <div class="login-right">
              <div>
                <div class="right-header">A desk, a deadline, a door you can close</div>
                <div class="right-quote-title">For writers between drafts</div>
                <div class="right-quote">
                  Design the way your work appears on the page, sit with the language until it hums, then send it across to the editors when you are ready.
                  <br><br><small style="text-transform:uppercase; letter-spacing:0.14em; font-size:0.78rem; color:rgba(245,242,234,0.7);">Winter 2026 · Online Studio</small>
                </div>
                <div class="excerpt-card">
                  <div style="text-transform:uppercase; letter-spacing:0.16em; font-size:0.72rem; color:rgba(245,242,234,0.6); margin-bottom:0.5rem;">From the gallery</div>
                  <div style="font-style: italic;">The light comes through in slanted geometry—<br>afternoon angles that make ordinary rooms sacred.<br>This is where the drafts learn how to speak.</div>
                </div>
              </div>
              <div>
                <div style="font-size:0.9rem; color:rgba(245,242,234,0.8);">Active calls, live typography sandbox, editorial queue—waiting inside.</div>
                <div class="badge"><span class="dot"></span>Studio status: Open</div>
              </div>
            </div>
          </div>
        </div>
      `;
      const tabSignin = document.getElementById('tab-signin');
      const tabNew = document.getElementById('tab-new');
      const signinForm = document.getElementById('signin-form');
      const newForm = document.getElementById('new-form');
      tabSignin.onclick = () => { tabSignin.classList.add('active'); tabNew.classList.remove('active'); signinForm.style.display='block'; newForm.style.display='none'; };
      tabNew.onclick = () => { tabNew.classList.add('active'); tabSignin.classList.remove('active'); signinForm.style.display='none'; newForm.style.display='block'; document.getElementById('new-name').focus(); };
      signinForm.onsubmit = handleLogin;
      newForm.onsubmit = handleQuickStart;
    }

    function fillDemo(email, password) {
      const e = document.getElementById('email'); const p = document.getElementById('password');
      if (!e || !p) return; e.value = email; p.value = password; e.focus();
    }

    function handleLogin(ev) {
      ev.preventDefault();
      const email = (document.getElementById('email').value || '').trim().toLowerCase();
      const password = document.getElementById('password').value;
      const err = document.getElementById('login-error');
      const user = users.find(u => u.email.toLowerCase() === email && u.password === password);
      if (!user) { err.style.display = 'block'; return; }
      err.style.display = 'none';
      currentUser = { id: user.id, name: user.name, role: user.role };
      persist();
      renderApp();
    }

    function handleQuickStart(ev) {
      ev.preventDefault();
      const nameInput = document.getElementById('new-name');
      const name = (nameInput?.value || '').trim();
      if (!name) return;
      const id = 'user-' + Date.now();
      const newUser = { id, email: `${id}@local`, password: null, name, role: 'writer' };
      users.push(newUser);
      currentUser = { id, name, role: 'writer' };
      persist();
      renderApp();
    }

    function logout() {
      currentUser = null;
      sessionStorage.removeItem('currentUser');
      renderApp();
    }

    // Views
    let activeView = 'studio';
    let activeDraftId = null;

    function renderApp() {
      if (!currentUser) { showLogin(); return; }
      const app = document.getElementById('app');
      const userDrafts = drafts.filter(d => d.owner === currentUser.id);
      const activeDraft = activeDraftId ? userDrafts.find(d => d.id === activeDraftId) : userDrafts[0];
      activeDraftId = activeDraft ? activeDraft.id : null;

      app.innerHTML = `
        <div class="topbar">
          <div class="logo">The Writer's Studio</div>
          <div class="nav">
            <button class="${activeView==='studio'?'active':''}" onclick="switchView('studio')">My Studio</button>
            <button class="${activeView==='editor'?'active':''}" onclick="switchView('editor')">Editor</button>
            <button class="${activeView==='gallery'?'active':''}" onclick="switchView('gallery')">Gallery</button>
            <button class="${activeView==='dashboard'?'active':''}" onclick="switchView('dashboard')">Editorial</button>
          </div>
          <div class="pill-user">
            <div>
              <div style="font-weight:600;">${currentUser.name}</div>
              <div class="subtle" style="font-size:0.85rem;">${currentUser.role}</div>
            </div>
            <button style="border:none; background:#fff; color:var(--accent);" onclick="logout()">Logout</button>
          </div>
        </div>
        <div class="layout">
          <div class="card" id="main-pane"></div>
          <div class="card" id="side-pane"></div>
        </div>
      `;
      renderMain(userDrafts, activeDraft);
    }

    function switchView(view) { activeView = view; renderApp(); }

    function renderMain(userDrafts, activeDraft) {
      const main = document.getElementById('main-pane');
      const side = document.getElementById('side-pane');
      if (activeView === 'studio') {
        main.innerHTML = `
          <h2>My Studio</h2>
          <p class="subtle">Drafts that live only in this browser. Create, iterate, and send to the gallery.</p>
          <button class="btn" style="width:auto;" onclick="createDraft()">New draft</button>
          <ul class="list" style="margin-top:1rem;">
            ${userDrafts.map(d => `
              <li onclick="selectDraft('${d.id}')" style="cursor:pointer; border-color:${d.id===activeDraftId? 'var(--accent)': 'var(--border)'}">
                <div>
                  <div style="font-weight:600;">${d.title || 'Untitled draft'}</div>
                  <div class="subtle" style="font-size:0.9rem;">Updated ${new Date(d.updated).toLocaleString()}</div>
                </div>
                <span class="status-tag">${d.status || 'Draft'}</span>
              </li>
            `).join('') || '<div class="subtle">No drafts yet. Create one to begin.</div>'}
          </ul>
        `;
        side.innerHTML = `
          <h3>Draft Info</h3>
          ${activeDraft ? `
            <div class="subtle">Title: ${activeDraft.title || 'Untitled'}</div>
            <div class="subtle">Visibility: ${activeDraft.visibility}</div>
            <div class="subtle">Status: ${activeDraft.status || 'Draft'}</div>
            <button class="btn" style="margin-top:0.8rem;" onclick="switchView('editor')">Open in Editor</button>
          ` : '<div class="subtle">Select a draft to view details.</div>'}
        `;
      } else if (activeView === 'editor') {
        main.innerHTML = `
          <h2>Editor</h2>
          ${activeDraft ? `
          <div class="editor-shell">
            <div>
              <input type="text" id="draft-title" placeholder="Title" value="${activeDraft.title || ''}" style="margin-bottom:0.6rem; font-size:1.1rem;">
              <textarea id="draft-body" class="textarea" placeholder="Write your piece...">${activeDraft.body || ''}</textarea>
            </div>
            <div class="preview" id="draft-preview"></div>
          </div>
          ` : '<div class="subtle">Create a draft first.</div>'}
        `;
        side.innerHTML = `
          <h3>Typography Lab</h3>
          <div class="lab-controls">
            <div>
              <label for="font">Font</label>
              <select id="font">
                <option value="serif">Serif</option>
                <option value="sans">Sans</option>
                <option value="mono">Mono</option>
              </select>
            </div>
            <div>
              <label for="lineHeight">Line height</label>
              <input type="range" id="lineHeight" min="1.2" max="2.2" step="0.05" value="${activeDraft?.lineHeight || 1.8}">
            </div>
            <div>
              <label for="theme">Page</label>
              <select id="theme">
                <option value="paper">Paper</option>
                <option value="cream">Cream</option>
                <option value="ink">Ink</option>
                <option value="night">Night</option>
              </select>
            </div>
            <button class="btn" onclick="saveDraft()">Save</button>
          </div>
          <div style="margin-top:1rem;">
            <label for="visibility">Visibility</label>
            <select id="visibility">
              <option value="private">Private</option>
              <option value="studio">Studio</option>
              <option value="public">Public</option>
            </select>
          </div>
        `;
        if (activeDraft) attachEditorHandlers(activeDraft);
      } else if (activeView === 'gallery') {
        const publicDrafts = drafts.filter(d => d.visibility === 'public');
        main.innerHTML = `
          <h2>Gallery</h2>
          <div class="gallery-grid">
            ${publicDrafts.map(d => `
              <div class="gallery-card">
                <div style="font-weight:600;">${d.title || 'Untitled'}</div>
                <div class="subtle">by ${userName(d.owner)}</div>
                <div style="margin-top:0.6rem; font-size:0.95rem; line-height:1.6;">${(d.body || '').slice(0,140)}...</div>
              </div>
            `).join('') || '<div class="subtle">No public pieces yet.</div>'}
          </div>
        `;
        side.innerHTML = `
          <h3>About the Gallery</h3>
          <p class="subtle">Accepted works flow here with author styling preserved. Toggle visibility in the editor.</p>
        `;
      } else if (activeView === 'dashboard') {
        const submissions = drafts.map(d => ({...d, author: userName(d.owner)}));
        main.innerHTML = `
          <h2>Editorial Dashboard</h2>
          <ul class="list">
            ${submissions.map(d => `
              <li>
                <div>
                  <div style="font-weight:600;">${d.title || 'Untitled'}</div>
                  <div class="subtle" style="font-size:0.9rem;">${d.author}</div>
                </div>
                <span class="status-tag">${d.visibility}</span>
              </li>
            `).join('') || '<div class="subtle">No submissions yet.</div>'}
          </ul>
        `;
        side.innerHTML = `<h3>Workflow</h3><p class="subtle">Review pieces, adjust status, and coordinate edits. (Demo static flow)</p>`;
      }
    }

    function userName(id) {
      const u = users.find(x => x.id === id); return u ? u.name : 'Unknown';
    }

    function createDraft() {
      const id = 'draft-' + Date.now();
      drafts.unshift({
        id, owner: currentUser.id, title: 'Untitled draft', body: '',
        visibility: 'private', status: 'Draft', lineHeight: 1.8, theme: 'paper',
        updated: Date.now()
      });
      activeDraftId = id;
      persist();
      renderApp();
    }

    function selectDraft(id) { activeDraftId = id; renderApp(); }

    function attachEditorHandlers(draft) {
      const titleEl = document.getElementById('draft-title');
      const bodyEl = document.getElementById('draft-body');
      const preview = document.getElementById('draft-preview');
      const font = document.getElementById('font');
      const lineHeight = document.getElementById('lineHeight');
      const theme = document.getElementById('theme');
      const visibility = document.getElementById('visibility');

      font.value = draft.font || 'serif';
      lineHeight.value = draft.lineHeight || 1.8;
      theme.value = draft.theme || 'paper';
      visibility.value = draft.visibility || 'private';

      function renderPreview() {
        preview.textContent = bodyEl.value || 'Your words will appear here.';
        preview.style.lineHeight = lineHeight.value;
        const fontMap = { serif: 'var(--serif)', sans: 'var(--sans)', mono: 'var(--mono)' };
        preview.style.fontFamily = fontMap[font.value] || 'var(--serif)';
        const themes = {
          paper: { bg:'#fff', color:'var(--ink)' },
          cream: { bg:'#fdf7ec', color:'var(--ink)' },
          ink: { bg:'#111', color:'#f7f4ee' },
          night: { bg:'#0d0f11', color:'#f5f2ea' }
        };
        const t = themes[theme.value] || themes.paper;
        preview.style.background = t.bg; preview.style.color = t.color;
      }

      [titleEl, bodyEl, font, lineHeight, theme, visibility].forEach(el => el.addEventListener('input', renderPreview));
      renderPreview();
    }

    function saveDraft() {
      const userDrafts = drafts.filter(d => d.owner === currentUser.id);
      const draft = drafts.find(d => d.id === activeDraftId);
      if (!draft) return;
      draft.title = document.getElementById('draft-title').value;
      draft.body = document.getElementById('draft-body').value;
      draft.font = document.getElementById('font').value;
      draft.lineHeight = parseFloat(document.getElementById('lineHeight').value);
      draft.theme = document.getElementById('theme').value;
      draft.visibility = document.getElementById('visibility').value;
      draft.updated = Date.now();
      persist();
      renderApp();
    }

    // Initialize
    renderApp();
  </script>
</body>
</html>
